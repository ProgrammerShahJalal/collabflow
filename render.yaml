# Render blueprint for the CollabFlow NestJS API.
# Deploy: https://dashboard.render.com → New → Blueprint → connect this repo.
# Render reads this file, provisions the service, and prompts for the secret
# env vars marked `sync: false` (set those in the dashboard, never commit them).
services:
  - type: web
    name: collabflow-api
    runtime: node
    plan: free
    region: oregon
    # pnpm is activated via corepack (packageManager is pinned in package.json).
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @collabflow/api build
    startCommand: pnpm --filter @collabflow/api start:prod
    healthCheckPath: /api/docs
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # ---- Secrets: set these in the Render dashboard (sync:false = not in git) ----
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false # e.g. https://your-web-app.vercel.app
      - key: CLOUDINARY_URL
        sync: false
      # ---- Non-secret defaults ----
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: MAX_FILE_SIZE_MB
        value: "10"
